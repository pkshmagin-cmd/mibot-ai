name: RunBot
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'
jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install
        run: pip install aiogram g4f
      - name: Run
        run: python mibot.py
        env:
          BOT_TOKEN:
  ${{ secrets.BOT_TOKEN }}
