name: RunBot
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install aiogram g4f
      - name: Run bot
        run: python mibot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
