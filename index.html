<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Shop 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; text-align: center; }
        .card { background: #111; border: 1px solid #00f2ff; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .btn { background: #00f2ff; color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; }
        h2 { color: #00f2ff; text-transform: uppercase; letter-spacing: 2px; }
        .price { font-size: 30px; color: #ffcc00; margin: 15px 0; }
    </style>
</head>
<body>
    <h2>Магазин 2026</h2>
    <div class="card">
        <h3>🎨 Пакет "Художник"</h3>
        <p>Генерация картинок без лимитов</p>
        <div class="price">⭐ 50</div>
        <button class="btn" onclick="pay()">КУПИТЬ</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Открывает Web App на весь экран
        function pay() {
            tg.sendData("pay_50_stars");
            tg.close();
        }
    </script>
</body>
</html>
